<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:Arial;
}

.container{
  padding:20px;
}

h1{
  text-align:center;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.btn{
  padding:8px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.delete{
  background:red;
  color:#fff;
}

.refresh{
  background:#22c55e;
  color:#000;
}

</style>
</head>

<body>

<div class="container">
  <h1>📊 لوحة التحكم</h1>

  <button class="btn refresh" onclick="loadBookings()">🔄 تحديث</button>

  <div id="list"></div>
</div>

<script>

const SUPABASE_URL = "https://vmbaxqghabxzvkcxwjdy.supabase.co";
const SUPABASE_KEY = "sb_publishable_5maKs94zmK6Iu5TbpiHkWw_SM0Ew2Y2";

async function loadBookings(){

  document.getElementById("list").innerHTML="جاري التحميل...";

  try{

    let res = await fetch(SUPABASE_URL + "/rest/v1/bookings?select=*",{
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":"Bearer " + SUPABASE_KEY
      }
    });

    let data = await res.json();

    if(!data){
      document.getElementById("list").innerHTML="❌ مفيش بيانات";
      return;
    }

    let html="";

    data.reverse().forEach(item=>{

      html+=`
      <div class="card">
        <b>👤 ${item.customer_name}</b><br>
        📱 ${item.customer_phone}<br>
        📍 ${item.branch}<br>
        💇 ${item.service}<br>
        💰 ${item.price} ريال<br>
        📅 ${item.booking_date}<br>
        🕐 ${item.booking_time}<br>
        💳 ${item.payment_method}<br>

        <button class="btn delete" onclick="deleteBooking(${item.id})">حذف</button>
      </div>
      `;
    });

    document.getElementById("list").innerHTML = html;

  }catch(e){
    document.getElementById("list").innerHTML="❌ حصل خطأ في التحميل";
  }
}

async function deleteBooking(id){

  if(!confirm("متأكد من الحذف؟")) return;

  await fetch(SUPABASE_URL + "/rest/v1/bookings?id=eq."+id,{
    method:"DELETE",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer " + SUPABASE_KEY
    }
  });

  loadBookings();
}

loadBookings();

</script>

</body>
</html>
