<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة حجز + واتساب</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#25d366;color:#fff;cursor:pointer}
.card{background:#1e293b;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>
<body>

<h2>⚙️ إعدادات واتساب</h2>
<input id="token" placeholder="Access Token">
<input id="inst" placeholder="Instance ID">
<button onclick="save()">💾 حفظ</button>

<h2>📋 تأكيد حجز</h2>
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم العميل">
<button onclick="confirmBooking()">✅ تأكيد وإرسال واتساب</button>

<div id="log"></div>

<script>
let waToken = localStorage.getItem("waToken") || "";
let waInst = localStorage.getItem("waInst") || "";

document.getElementById("token").value = waToken;
document.getElementById("inst").value = waInst;

function save(){
  waToken = document.getElementById("token").value;
  waInst = document.getElementById("inst").value;

  localStorage.setItem("waToken", waToken);
  localStorage.setItem("waInst", waInst);

  alert("تم الحفظ");
}

function formatPhone(p){
  let c = p.replace(/\D/g,"");
  if(!c.startsWith("966")){
    c = "966" + c.replace(/^0/,"");
  }
  return c;
}

async function sendWA(name, phone){
  try{
    const payload = {
      number: formatPhone(phone),
      message: `✅ تم تأكيد حجزك يا ${name}`,
      instance_id: waInst,
      access_token: waToken
    };

    const res = await fetch("https://whatsbot.at/whatsapp_livechat/send_message",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    document.getElementById("log").innerHTML += 
      "<div class='card'>"+text+"</div>";

    if(!res.ok){
      alert("❌ فشل الإرسال");
      return;
    }

    alert("✅ تم إرسال الرسالة");

  }catch(e){
    alert("❌ خطأ: "+e.message);
  }
}

function confirmBooking(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if(!name || !phone){
    alert("اكتب البيانات");
    return;
  }

  sendWA(name, phone);
}
</script>

</body>
</html>
